<!DOCTYPE html>
<html>

<head>
<title>SVG Fundamentals</title>

<link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
<header class="header-grid">
<button id="theme-toggle" onclick="myFunction()">&#128161</button>
</header>
<section class="grid-container">
<svg width="100" height="100">
    <line
    x1="80"
    y1="80"
    x2="200"
    y2="200"
    stroke="oklch(from hsl(0.3 100% 50%)  0.25 0.3 164)"
    stroke-width="5"
    />
</svg>

<svg width="100" height="100">
    <rect
    x="60"
    y="100"
    width="180"
    height="100"
    fill="none"
    stroke="oklch(0.9 0.3 164)"
    stroke-width="5"
    />
</svg>

<svg width="100" height="100">
  <rect
    x="80"
    y="100"
    width="500"
    height="500"
    rx="100"
    ry="100"
    stroke="green"
    stroke-width="5"
    fill="none"
  />
</svg>

<svg width="100" height="100">
  <circle
    cx="140"
    cy="140"
    r="70"
    fill="none"
    stroke="oklch(0.9 0.3 164)"
    stroke-width="5"
  />
</svg>

<svg width="100" height="100">
  <ellipse
    cx="160"
    cy="150"
    rx="100"
    ry="48"
    fill="none"
    stroke="oklch(0.9 0.3 164)"
    stroke-width="5"
  />
</svg>

<svg width="100" height="100">
  <polygon
    points="
      60,100
      100,180
      140,140
      180,180
      220,100
    "
    fill="none"
    stroke="oklch(0.9 0.3 164)"
    stroke-width="5"
  />
</svg>

</section>
<script src="main.js"></script>
</body>

</html>
