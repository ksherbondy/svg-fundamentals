<!DOCTYPE html>
<html>

<head>
<title>SVG Fundamentals</title>

<link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

<section class="grid-container">
<svg width="280" height="280">
    <line
    x1="80"
    y1="80"
    x2="200"
    y2="200"
    stroke="oklch(0.9 0.3 164)"
    stroke-width="5"
    />
</svg>

<svg width="300" height="300">
    <rect
    x="60"
    y="100"
    width="180"
    height="100"
    fill="none"
    stroke="oklch(0.9 0.3 164)"
    stroke-width="5"
    />
</svg>

<svg width="340" height="340">
  <rect
    x="80"
    y="100"
    width="500"
    height="500"
    rx="100"
    ry="100"
    stroke="green"
    stroke-width="5"
    fill="none"
  />
</svg>

<svg width="280" height="280">
  <circle
    cx="140"
    cy="140"
    r="70"
    fill="none"
    stroke="oklch(0.9 0.3 164)"
    stroke-width="5"
  />
</svg>

<svg width="300" height="300">
  <ellipse
    cx="160"
    cy="150"
    rx="100"
    ry="48"
    fill="none"
    stroke="oklch(0.9 0.3 164)"
    stroke-width="5"
  />
</svg>

<svg width="300" height="300">
  <polygon
    points="
      60,100
      100,180
      140,140
      180,180
      220,100
    "
    fill="none"
    stroke="oklch(0.9 0.3 164)"
    stroke-width="5"
  />
</svg>

</section>
</body>

</html>
